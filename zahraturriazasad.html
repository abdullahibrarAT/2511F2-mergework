<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        body {
            background-image: url('Screenshot 2026-04-07 145506.png');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }

        .main-box {
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .content {
            color: white;
        }

        button {
            padding: 10px 40px;
            border-radius: 8px;
            font-size: 16px;
            color: #ffffff80;
            background: transparent;
            border: 1px solid #ffffff80;
            transition: 0.5s ease;
        }

        button:hover {
            color: #ffffff;
            background: #000000;
            border: 1px solid #ffffff;
            box-shadow: 0 0 10px #000000, 0 0 30px #000000;
        }

        /* 📱 Mobile Fix */
        @media (max-width: 768px) {
            .content {
                text-align: center;
            }

            h1 {
                font-size: 28px;
            }

            h3 {
                font-size: 18px;
            }

            button {
                width: 100%;
                margin-bottom: 15px;
            }
        }
    </style>
</head>

<body>

<div class="container main-box">
    <div class="content">
        <button id="btn">Hi I'm</button>

        <h1 class="mt-3">Zahra Tur Riaz Asad</h1>
        <h3>Web Designer</h3>

        <p><i class="fa-solid fa-envelope"></i> akzahra@gmail.com</p>
        <p><i class="fa-solid fa-phone"></i> +92 316 4166699</p>
        <p><i class="fa-solid fa-house"></i> 27 Paris, New York</p>
    </div>
</div>

</body>
</html>
