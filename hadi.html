<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Design</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('your-image.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
}


.card{
    width:900px;
    height:400px;
    background:#0b0f1a;
    border-radius:15px;
    display:flex;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}


.left{
    width:60%;
    padding:40px;
    color:rgba(230, 222, 210, 0.336);
}

.left h2{
    font-size:28px;
    margin-bottom:20px;
}

.info{
    margin:15px 0;
    font-size:16px;
}


.right{
    width:40%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0b0f1a;
}

.profile-img{
    width:180px;
    height:180px;
    border-radius:50%;
    border:6px solid #af5a5a;
    overflow:hidden;
}

.profile-img img{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>

</head>
<body>

<div class="card">

    <div class="left">
        <h2>Product Designer</h2>
        <div class="info">📧 Hadiimuqaddam@gmail.com</div>
        <div class="info">📞 +923452497320 </div>
        <div class="info">📍 37, Pollsand, New York, united State</div>
    </div>

    <div class="right">
        <div class="profile-img">
            <img src="download.jfif" alt="Profile">
        </div>
    </div>

</div>

</body>
</html>
